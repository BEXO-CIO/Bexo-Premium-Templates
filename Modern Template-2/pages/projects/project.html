<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project</title>
    <link rel="icon" type="image/png" href="../../assets/bexo-logo.png" />
    <link rel="apple-touch-icon" href="../../assets/bexo-logo.png" />
    <link rel="stylesheet" href="../../css/fonts.css?v=6" />
    <link rel="stylesheet" href="../../css/styles.css?v=6" />
    <link rel="stylesheet" href="../../css/nav.css?v=6" />
    <link rel="stylesheet" href="../../css/project.css?v=6" />
    <link rel="stylesheet" href="../../css/bexo.css?v=6" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="boot-loader" role="status" aria-label="Loading portfolio">
      <img class="boot-loader-brand" src="../../assets/bexo-logo.png" alt="BEXO" />
      <div class="boot-loader-mark"></div>
      <div class="boot-loader-text">Portfolio</div>
    </div>

    <header class="logo">
      <div class="logo-wrapper">
        <a href="../../index.html">Portfolio</a>
      </div>
    </header>

    <div class="btn" id="toggle-btn" role="button" tabindex="0" aria-label="Open menu" aria-expanded="false">
      <div class="btn-outline btn-outline-1"></div>
      <div class="btn-outline btn-outline-2"></div>
      <div id="hamburger"><span></span></div>
    </div>

    <div class="overlay" aria-hidden="true">
      <svg viewBox="0 0 350 1000">
        <path d="M0 2S175 1 500 1s500 1 500 1V0H0Z"></path>
      </svg>
    </div>

    <nav class="menu" id="site-menu" aria-label="Primary"></nav>

    <div class="wrapper" id="main">
      <div class="container">
        <div class="site-content">
          <section class="project-hero">
            <div class="project-header">
              <div class="row">
                <h1 class="primary" data-field="project-title">
                  <div class="hr"></div>
                  Project
                  <div class="hr"></div>
                </h1>
              </div>
            </div>
          </section>
        </div>
      </div>

      <section class="project-hero-img">
        <img src="" alt="" />
      </section>

      <div class="container">
        <div class="site-content">
          <section class="project-description">
            <div class="project-desc-col">
              <h4>Roles &amp; Stack</h4>
              <br />
              <p></p>
            </div>
            <div class="project-desc-col">
              <p></p>
            </div>
          </section>
        </div>
      </div>

      <section class="project-quote">
        <div class="quote">
          <h2></h2>
        </div>
      </section>

      <section class="project-slider">
        <div class="carousel">
          <div class="carousel--wrap"></div>
        </div>
      </section>

      <div class="container">
        <div class="site-content">
          <section class="project-about">
            <div class="project-about-header">
              <h2>About</h2>
            </div>
            <div class="project-about-copy">
              <p data-field="project-about"></p>
              <div data-field="project-actions"></div>
            </div>
          </section>

          <section class="next-project">
            <a href="./project.html">
              <p>Next project</p>
              <h1></h1>
            </a>
          </section>
        </div>
      </div>

      <section class="project-footer">
        <div class="copyright">
          <span></span>
        </div>
      </section>
    </div>

    <script src="../../js/profile-data.js?v=6"></script>
    <script src="../../js/profile-runtime.js?v=6"></script>
    <script src="../../js/theme.js?v=6"></script>
    <script src="../../js/media.js?v=6"></script>
    <script src="../../js/contact.js?v=6"></script>
    <script src="../../js/nav.js?v=6"></script>
    <script src="../../js/render.js?v=6"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CSSRulePlugin.min.js"></script>
    <script src="../../js/script.js?v=6"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="icon" type="image/png" href="../assets/bexo-logo.png" />
    <link rel="apple-touch-icon" href="../assets/bexo-logo.png" />
    <link rel="stylesheet" href="../css/fonts.css?v=7" />
    <link rel="stylesheet" href="../css/styles.css?v=7" />
    <link rel="stylesheet" href="../css/nav.css?v=7" />
    <link rel="stylesheet" href="../css/contact.css?v=7" />
    <link rel="stylesheet" href="../css/bexo.css?v=7" />
  </head>
  <body class="contact-page">
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="boot-loader" role="status" aria-label="Loading portfolio">
      <div class="boot-loader-stack">
        <img class="boot-loader-brand" src="../assets/bexo-logo.png" alt="BEXO" />
        <div class="boot-loader-text">Portfolio</div>
        <div class="boot-loader-bar" aria-hidden="true"></div>
      </div>
    </div>

    <header class="logo">
      <div class="logo-wrapper">
        <a href="../index.html">Portfolio</a>
      </div>
    </header>

    <div class="btn" id="toggle-btn" role="button" tabindex="0" aria-label="Open menu" aria-expanded="false">
      <div class="btn-outline btn-outline-1"></div>
      <div class="btn-outline btn-outline-2"></div>
      <div id="hamburger"><span></span></div>
    </div>

    <div class="overlay" aria-hidden="true">
      <svg viewBox="0 0 350 1000">
        <path d="M0 2S175 1 500 1s500 1 500 1V0H0Z"></path>
      </svg>
    </div>

    <nav class="menu" id="site-menu" aria-label="Primary"></nav>

    <main id="main" class="container">
      <div class="site-content contact-shell">
        <div data-contact-root></div>
      </div>
    </main>

    <script src="../js/profile-data.js?v=7"></script>
    <script src="../js/profile-runtime.js?v=7"></script>
    <script src="../js/theme.js?v=7"></script>
    <script src="../js/media.js?v=7"></script>
    <script src="../js/contact.js?v=7"></script>
    <script src="../js/nav.js?v=7"></script>
    <script src="../js/render.js?v=7"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CSSRulePlugin.min.js"></script>
    <script src="../js/script.js?v=7"></script>
  </body>
</html>

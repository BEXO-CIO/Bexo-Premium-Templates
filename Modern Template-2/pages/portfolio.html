<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="icon" type="image/png" href="../assets/bexo-logo.png" />
    <link rel="apple-touch-icon" href="../assets/bexo-logo.png" />
    <link rel="stylesheet" href="../css/fonts.css?v=7" />
    <link rel="stylesheet" href="../css/styles.css?v=7" />
    <link rel="stylesheet" href="../css/nav.css?v=7" />
    <link rel="stylesheet" href="../css/work.css?v=7" />
    <link rel="stylesheet" href="../css/portfolio.css?v=7" />
    <link rel="stylesheet" href="../css/bexo.css?v=7" />
  </head>
  <body class="portfolio-page">
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="boot-loader" role="status" aria-label="Loading portfolio">
      <div class="boot-loader-stack">
        <img class="boot-loader-brand" src="../assets/bexo-logo.png" alt="BEXO" />
        <div class="boot-loader-text">Portfolio</div>
        <div class="boot-loader-bar" aria-hidden="true"></div>
      </div>
    </div>

    <header class="logo">
      <div class="logo-wrapper">
        <a href="../index.html">Portfolio</a>
      </div>
    </header>

    <div class="btn" id="toggle-btn" role="button" tabindex="0" aria-label="Open menu" aria-expanded="false">
      <div class="btn-outline btn-outline-1"></div>
      <div class="btn-outline btn-outline-2"></div>
      <div id="hamburger"><span></span></div>
    </div>

    <div class="overlay" aria-hidden="true">
      <svg viewBox="0 0 350 1000">
        <path d="M0 2S175 1 500 1s500 1 500 1V0H0Z"></path>
      </svg>
    </div>

    <nav class="menu" id="site-menu" aria-label="Primary"></nav>

    <div class="smoothScroll" id="main">
      <section class="portfolio-body site-content">
        <section class="portfolio-about" data-section="about">
          <div class="about-grid">
            <div class="about-photo">
              <img data-field="photo" src="" alt="" loading="lazy" />
            </div>
            <div class="about-copy-block">
              <span class="section-kicker">About</span>
              <h2 data-field="name"></h2>
              <h3 data-field="title"></h3>
              <p class="about-status" data-field="status"></p>
              <p data-field="bio"></p>
              <p class="about-goal" data-field="goal"></p>
            </div>
          </div>
        </section>

        <section class="awards" data-section="skills">
          <div class="awards-header"><h3>Skills</h3></div>
          <div class="skills-row" data-bexo-list="skills"></div>
        </section>

        <section class="awards" data-section="experience">
          <div class="awards-header"><h3>Experience</h3></div>
          <div class="awards-copy" data-bexo-list="experience"></div>
        </section>

        <section class="awards" data-section="education">
          <div class="awards-header"><h3>Education</h3></div>
          <div class="awards-copy" data-bexo-list="education"></div>
        </section>
      </section>

      <section class="portfolio-rail">
        <div class="portfolio-rail-label">
          <span>Selected Work</span>
        </div>
        <div class="content-container" data-bexo-list="projects"></div>
      </section>

      <section class="portfolio-body site-content portfolio-body--lower">
        <section class="awards" data-section="certificates">
          <div class="awards-header"><h3>Certificates</h3></div>
          <div class="awards-copy" data-bexo-list="certificates"></div>
        </section>

        <section class="awards" data-section="awards">
          <div class="awards-header"><h3>Achievements</h3></div>
          <div class="awards-copy" data-bexo-list="awards"></div>
        </section>

        <section class="awards" data-section="research">
          <div class="awards-header"><h3>Research</h3></div>
          <div class="awards-copy" data-bexo-list="research"></div>
        </section>
      </section>
    </div>

    <script src="../js/profile-data.js?v=7"></script>
    <script src="../js/profile-runtime.js?v=7"></script>
    <script src="../js/theme.js?v=7"></script>
    <script src="../js/media.js?v=7"></script>
    <script src="../js/contact.js?v=7"></script>
    <script src="../js/nav.js?v=7"></script>
    <script src="../js/render.js?v=7"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CSSRulePlugin.min.js"></script>
    <script src="../js/script.js?v=7"></script>
  </body>
</html>
